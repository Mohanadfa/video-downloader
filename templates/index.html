<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تحميل فيديو</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=2">
</head>
<body>
  <div class="background-blur blur-1"></div>
  <div class="background-blur blur-2"></div>

  <main class="container">
    <section class="card">
      <div class="badge">Download from youtube</div>

      <h1>تحميل فيديو من رابط</h1>
      <p class="subtitle">
        الصق الرابط ثم اضغط تحميل. بعد تجهيز الملف سيبدأ التنزيل مباشرة.
      </p>

      <div class="form-box">
        <label for="videoUrl">رابط الفيديو</label>
        <input
          id="videoUrl"
          type="text"
          placeholder="مثال: https://youtube.com/shorts/..."
          autocomplete="off"
        />

        <button id="downloadBtn">تحميل الآن</button>
      </div>

      <div id="statusBox" class="status hidden"></div>
    </section>
  </main>

  <script>
    const downloadBtn = document.getElementById("downloadBtn");
    const videoUrl = document.getElementById("videoUrl");
    const statusBox = document.getElementById("statusBox");

    function showStatus(message, type = "info") {
      statusBox.className = `status ${type}`;
      statusBox.textContent = message;
      statusBox.classList.remove("hidden");
    }

    downloadBtn.addEventListener("click", async () => {
      const url = videoUrl.value.trim();

      if (!url) {
        showStatus("حط رابط الفيديو أول", "error");
        return;
      }

      downloadBtn.disabled = true;
      downloadBtn.textContent = "جاري التجهيز...";
      showStatus("يتم تجهيز الفيديو، انتظر شوي...", "loading");

      try {
        const response = await fetch("/download", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ url })
        });

        const contentType = response.headers.get("content-type") || "";

        if (!response.ok) {
          const data = await response.json();
          throw new Error(data.error || "فشل التحميل");
        }

        if (contentType.includes("application/json")) {
          const data = await response.json();
          throw new Error(data.error || "فشل التحميل");
        }

        const blob = await response.blob();
        const blobUrl = window.URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = blobUrl;
        a.download = "video.mp4";
        document.body.appendChild(a);
        a.click();
        a.remove();

        window.URL.revokeObjectURL(blobUrl);

        showStatus("تم تنزيل الفيديو بنجاح", "success");
      } catch (error) {
        showStatus(error.message || "حدث خطأ غير متوقع", "error");
      } finally {
        downloadBtn.disabled = false;
        downloadBtn.textContent = "تحميل الآن";
      }
    });
  </script>
</body>
</html>
