<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تحميل فيديو</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="background-blur blur-1"></div>
  <div class="background-blur blur-2"></div>

  <main class="container">
    <section class="card">
      <div class="badge">Download from youtube</div>

      <h1>تحميل فيديو من رابط</h1>
      <p class="subtitle">
        الصق الرابط ثم اضغط تحميل. بعد تجهيز الملف بيطلع لك زر تحميل مباشر.
      </p>

      <div class="form-box">
        <label for="videoUrl">رابط الفيديو</label>
        <input
          id="videoUrl"
          type="text"
          placeholder="مثال: https://youtube.com/shorts/..."
          autocomplete="off"
        />

        <button id="downloadBtn">تحميل الآن</button>
      </div>

      <div id="statusBox" class="status hidden"></div>

      <div id="resultBox" class="result hidden">
        <h3>الملف جاهز</h3>
        <p id="videoTitle"></p>
        <a id="downloadLink" class="download-link" href="#" target="_blank">تحميل الفيديو</a>
      </div>
    </section>
  </main>

  <script>
    const downloadBtn = document.getElementById("downloadBtn");
    const videoUrl = document.getElementById("videoUrl");
    const statusBox = document.getElementById("statusBox");
    const resultBox = document.getElementById("resultBox");
    const videoTitle = document.getElementById("videoTitle");
    const downloadLink = document.getElementById("downloadLink");

    function showStatus(message, type = "info") {
      statusBox.className = `status ${type}`;
      statusBox.textContent = message;
      statusBox.classList.remove("hidden");
    }

    function hideStatus() {
      statusBox.classList.add("hidden");
    }

    function hideResult() {
      resultBox.classList.add("hidden");
    }

    downloadBtn.addEventListener("click", async () => {
      const url = videoUrl.value.trim();
      hideResult();

      if (!url) {
        showStatus("حط رابط الفيديو أول", "error");
        return;
      }

      downloadBtn.disabled = true;
      downloadBtn.textContent = "جاري التجهيز...";
      showStatus("يتم معالجة الرابط وتحميل الملف، انتظر شوي...", "loading");

      try {
        const response = await fetch("/download", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ url })
        });

        const data = await response.json();

        if (!response.ok || !data.success) {
          throw new Error(data.error || "فشل التحميل");
        }

        showStatus("تم تجهيز الفيديو بنجاح", "success");
        videoTitle.textContent = data.title;
        downloadLink.href = data.download_url;
        resultBox.classList.remove("hidden");
      } catch (error) {
        showStatus(error.message || "حدث خطأ غير متوقع", "error");
      } finally {
        downloadBtn.disabled = false;
        downloadBtn.textContent = "تحميل الآن";
      }
    });
  </script>
</body>
</html>
